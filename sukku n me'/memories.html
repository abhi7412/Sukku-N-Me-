<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at top, #2b0f1f, #050207);
  color: #fff;
  overflow-x: hidden;
}

/* Header */
.header {
  padding: 16px;
}
.back {
  background: rgba(255,255,255,0.12);
  border: none;
  color: #fff;
  padding: 8px 14px;
  border-radius: 999px;
  cursor: pointer;
}

/* Text */
.text {
  text-align: center;
  padding: 10px 20px 20px;
}
.text h1 {
  color: #ff5fa2;
  font-size: clamp(20px, 5vw, 36px);
  line-height: 1.25;
}
.text p {
  font-size: 14px;
  opacity: 0.7;
  margin-top: 6px;
}

/* Carousel */
.carousel {
  position: relative;
  width: 100%;
  display: flex;
  justify-content: center;
}

.viewport {
  width: 90%;
  max-width: 380px;
  height: 60vh;
  overflow: hidden;
  border-radius: 26px;
  box-shadow: 0 25px 60px rgba(255,95,162,0.45);
  background: #000;
}

.track {
  display: flex;
  height: 100%;
  transition: transform 0.45s ease;
}

.slide {
  min-width: 100%;
  height: 100%;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Arrows */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.2);
  color: #fff;
  font-size: 26px;
  cursor: pointer;
}

.arrow.left { left: 10px; }
.arrow.right { right: 10px; }

/* Mobile arrows below */
.mobile-arrows {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 18px;
}

.mobile-arrows button {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.2);
  color: #fff;
  font-size: 24px;
}

/* Hide side arrows on mobile */
@media (max-width: 767px) {
  .arrow { display: none; }
}

/* Hide bottom arrows on desktop */
@media (min-width: 768px) {
  .mobile-arrows { display: none; }
}

/* Dots */
.dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 18px 0 14px;
}
.dots span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
}
.dots .active {
  background: #ff5fa2;
}

/* CTA */
.hint {
  text-align: center;
  font-size: 14px;
  opacity: 0.6;
  margin-bottom: 10px;
}

.cta {
  position: relative;
  margin: 0 auto 28px;
  display: block;
  background: linear-gradient(135deg, #ff5fa2, #ff2f86);
  border: none;
  padding: 15px 34px;
  border-radius: 999px;
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 14px 35px rgba(255,95,162,0.45);
  animation: pulse 2.6s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { box-shadow: 0 14px 35px rgba(255,95,162,0.35); }
  50% { box-shadow: 0 14px 50px rgba(255,95,162,0.6); }
}
</style>
</head>

<body>

<header class="header">
  <button class="back" onclick="history.back()">← Back</button>
</header>

<section class="text">
  <h1>You made everything so colourful,<br>life got bright 😍</h1>
  <p>You’ve made every moment so special ❤️</p>
</section>

<section class="carousel">
  <button class="arrow left">‹</button>

  <div class="viewport">
  <div class="track" id="track">
    <div class="slide"><img src="./assets/img1.jpg" alt="Memory 1"></div>
    <div class="slide"><img src="./assets/img2.jpg" alt="Memory 2"></div>
    <div class="slide"><img src="./assets/img3.jpg" alt="Memory 3"></div>
  </div>
</div>

  <button class="arrow right">›</button>
</section>

<div class="mobile-arrows">
  <button id="prev">‹</button>
  <button id="next">›</button>
</div>

<div class="dots" id="dots"></div>

<p class="hint">I wanna say you something…</p>
<button class="cta" onclick="nextStep()">❤️ See My Message →</button>
<script>
    function nextStep() {
      // Change if needed
      window.location.href = "./letter.html";
    }
  </script>

<script>
const track = document.getElementById("track");
const slides = document.querySelectorAll(".slide");
const dotsWrap = document.getElementById("dots");

let index = 0;

/* dots */
slides.forEach((_, i) => {
  const dot = document.createElement("span");
  if (i === 0) dot.classList.add("active");
  dotsWrap.appendChild(dot);
});
const dots = dotsWrap.querySelectorAll("span");

function update() {
  track.style.transform = `translateX(-${index * 100}%)`;
  dots.forEach(d => d.classList.remove("active"));
  dots[index].classList.add("active");
}

function next() {
  index = (index + 1) % slides.length;
  update();
}
function prev() {
  index = (index - 1 + slides.length) % slides.length;
  update();
}

document.querySelector(".arrow.left").onclick = prev;
document.querySelector(".arrow.right").onclick = next;
document.getElementById("prev").onclick = prev;
document.getElementById("next").onclick = next;

/* swipe */
let startX = 0;
track.addEventListener("touchstart", e => startX = e.touches[0].clientX);
track.addEventListener("touchend", e => {
  const diff = e.changedTouches[0].clientX - startX;
  if (diff > 50) prev();
  if (diff < -50) next();
});

update();
</script>

</body>
</html>
