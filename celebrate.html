<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever 💖</title>

<style>
/* ========= RESET ========= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at top, #2b0f1f, #050207);
  color: #fff;
  overflow: hidden;
}

/* ========= CONFETTI CANVAS ========= */
canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ========= CONTENT ========= */
.container {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}

/* ========= TITLE ========= */
h1 {
  color: #ff5fa2;
  font-size: clamp(28px, 6vw, 48px);
  margin-bottom: 10px;
}

.subtitle {
  opacity: 0.7;
  font-size: 16px;
  margin-bottom: 6px;
}

.promise {
  font-style: italic;
  opacity: 0.6;
  margin-bottom: 28px;
}

/* ========= HEART ========= */
.heart-wrapper {
  margin: 26px 0 40px;
}

.heart {
  width: 100px;
  height: 100px;
  background: #ff4f9a;
  position: relative;
  transform: rotate(-45deg);
  animation: heartbeat 1.4s ease-in-out infinite;
  box-shadow: 0 0 40px rgba(255,79,154,0.7);
}

.heart::before,
.heart::after {
  content: "";
  width: 100px;
  height: 100px;
  background: #ff4f9a;
  border-radius: 50%;
  position: absolute;
}

.heart::before {
  top: -50px;
  left: 0;
}

.heart::after {
  left: 50px;
  top: 0;
}

/* Heartbeat animation */
@keyframes heartbeat {
  0% {
    transform: rotate(-45deg) scale(1);
    box-shadow: 0 0 30px rgba(255,79,154,0.5);
  }
  25% {
    transform: rotate(-45deg) scale(1.12);
    box-shadow: 0 0 55px rgba(255,79,154,0.9);
  }
  40% {
    transform: rotate(-45deg) scale(1);
  }
  60% {
    transform: rotate(-45deg) scale(1.08);
  }
  100% {
    transform: rotate(-45deg) scale(1);
  }
}

/* ========= REPLAY BUTTON ========= */
.replay {
  margin-top: 10px;
  background: transparent;
  border: 1px solid rgba(255,95,162,0.5);
  color: #ff5fa2;
  padding: 12px 26px;
  border-radius: 999px;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.replay:hover {
  background: rgba(255,95,162,0.15);
  transform: scale(1.05);
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">
  <h1>You made me the happiest!</h1>
  <div class="subtitle">Thank you for being there 💝</div>
  <div class="promise">I promise to love you forever and always…</div>

  <div class="heart-wrapper">
    <div class="heart"></div>
  </div>

  <button class="replay" onclick="location.reload()">↻ Replay All</button>
</div>

<script>
/* ========= CONFETTI ENGINE ========= */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const colors = ["#ff5fa2", "#ff88c2", "#ffc1dd", "#ffffff"];
const confetti = [];

const isMobile = window.innerWidth < 768;
const CONFETTI_COUNT = isMobile ? 120 : 220;

for (let i = 0; i < CONFETTI_COUNT; i++) {
  confetti.push({
    x: Math.random() * W,
    y: Math.random() * H - H,
    size: Math.random() * 6 + 4,
    speed: Math.random() * 2 + 1,
    drift: Math.random() * 1.5 - 0.75,
    color: colors[Math.floor(Math.random() * colors.length)],
    shape: Math.random() > 0.5 ? "circle" : "square"
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  confetti.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.beginPath();

    if (p.shape === "circle") {
      ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
    } else {
      ctx.rect(p.x, p.y, p.size, p.size);
    }

    ctx.fill();

    p.y += p.speed;
    p.x += p.drift;

    if (p.y > H) {
      p.y = -10;
      p.x = Math.random() * W;
    }
  });

  requestAnimationFrame(draw);
}

/* Start immediately */
draw();
</script>

</body>
</html>
