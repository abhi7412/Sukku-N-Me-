<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just for You</title>

<style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at top, #2b0f1f, #050207);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ===== FLOATING BACKGROUND ===== */
.bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle, rgba(255,95,162,0.22) 2px, transparent 2px);
  background-size: 44px 44px;
  opacity: 0.18;
  animation: drift 28s linear infinite;
}

@keyframes drift {
  from { transform: translateY(0); }
  to { transform: translateY(-44px); }
}

/* ===== CONTAINER ===== */
.container {
  text-align: center;
  z-index: 1;
  padding: 24px;
  width: 100%;
  max-width: 420px;
}

/* ===== ENVELOPE ===== */
.envelope {
  width: 72px;
  margin: 0 auto 18px;
  animation: float 3.6s ease-in-out infinite;
}

.envelope img {
  width: 100%;
  display: block;
}

/* ===== TITLE ===== */
.title {
  font-size: clamp(22px, 5vw, 34px);
  margin-bottom: 26px;
}

.title span {
  color: #ff5fa2;
}

/* ===== CLICKABLE BOX (BUTTON) ===== */
.box-btn {
  width: 100%;
  height: 240px;
  border-radius: 26px;
  border: 1px solid rgba(255,95,162,0.35);
  background: rgba(255,255,255,0.04);
  box-shadow:
    0 20px 50px rgba(255,95,162,0.25);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  animation: floatSlow 4.8s ease-in-out infinite;
  transition:
    transform 0.35s cubic-bezier(.2,.8,.2,1),
    box-shadow 0.35s ease;
  position: relative;
}

/* Glow halo */
.box-btn::before {
  content: "";
  position: absolute;
  inset: -14px;
  border-radius: inherit;
  background: radial-gradient(
    circle,
    rgba(255,95,162,0.55),
    transparent 70%
  );
  opacity: 0;
  filter: blur(18px);
  transition: opacity 0.35s ease;
  z-index: -1;
}

/* Hover pop (desktop) */
.box-btn:hover {
  transform: scale(1.08);
  box-shadow:
    0 28px 70px rgba(255,95,162,0.55);
}

.box-btn:hover::before {
  opacity: 1;
}

/* Tap (mobile) */
.box-btn:active {
  transform: scale(0.96);
}

/* ===== CAT ===== */
.cat {
  width: 96px;
  margin-bottom: 14px;
}

.cat img {
  width: 100%;
  display: block;
}

/* ===== TEXT ===== */
.tap-text {
  font-size: 14px;
  opacity: 0.7;
}

/* ===== ANIMATIONS ===== */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes floatSlow {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

  <!-- Envelope -->
  <div class="envelope">
    <img src="./assets/envelope.png" alt="Letter">
  </div>

  <h1 class="title">This is just for <span>you</span>...</h1>

  <!-- FULL BOX BUTTON -->
  <div class="box-btn" onclick="openLetter()">
    <div class="cat">
      <img src="./assets/cat3.gif" alt="Tap">
    </div>
    <div class="tap-text">Tap to see what’s inside</div>
  </div>

</div>

<script>
function openLetter() {
  // Change to your next page
  window.location.href = "./final-message.html";
}
</script>

</body>
</html>
